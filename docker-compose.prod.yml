version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ycf_mysql
    restart: always
    environment:
      # ⚠️ 生产环境不要在 compose 中明文写口令；请通过宿主机环境变量或 env_file 注入
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_image_tool}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - ycf_network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ycf_redis
    restart: always

    volumes:
      - ./data/redis:/data
    networks:
      - ycf_network

  # 后端服务（仅宿主机可访问，由宿主机 Nginx 反代）
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ycf_backend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    # 建议：在服务器上创建单独的 .env.prod（不要提交到 git），由 compose 自动加载
    # 也可以不使用 env_file，改用部署系统注入环境变量
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      # 【关键配置】Docker内部连接走服务名，不用改 IP
      DB_HOST: mysql
      DB_PORT: 3306 
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_DATABASE: ${MYSQL_DATABASE:-ai_image_tool}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # 下面是你的 API Key 等配置，请确保由环境变量或 env_file 注入
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://www.artycf.com,http://www.artycf.com}
    volumes:
      - ./Backend/uploads:/app/uploads
      - ./Backend/temp:/app/temp
    depends_on:
      - mysql
      - redis
    networks:
      - ycf_network

  # 前端服务（仅宿主机可访问，由宿主机 Nginx 反代）
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: ycf_frontend
    restart: always
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    networks:
      - ycf_network

networks:
  ycf_network:
    driver: bridge