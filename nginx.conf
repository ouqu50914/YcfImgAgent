# 运行用户
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

# 必须要有 events 块
events {
    worker_connections 1024;
}

# 必须要有 http 块，你的配置都在这里面
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include /etc/nginx/conf.d/*.conf;

    # ================= 宿主机反向代理（与 docker-compose.prod 配套）=================
    # 使用方式：复制本 server 块到 /etc/nginx/conf.d/ycf.conf，或 include 本文件到 http 块
    # 前端：127.0.0.1:8080  后端：127.0.0.1:3000
    server {
        listen       80;
        server_name  _;   # 改为你的域名，如 artycf.com www.artycf.com

        client_max_body_size 100M;

        # 后端 API（优先匹配，避免被前端吞掉）
        location /api {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_send_timeout   1800s;
            proxy_read_timeout   1800s;
        }

        # 上传文件 / 静态资源
        location /uploads {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 健康检查（可选）
        location /health {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
        }

        # 前端 SPA（其余请求走前端容器）
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    # ================= 配置结束 =================
}