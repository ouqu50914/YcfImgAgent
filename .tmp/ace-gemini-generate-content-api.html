    <script>
      (() => {
        try {
          const normalizeTheme = (value) => {
            if (!value) return null;
            const lower = String(value).trim().toLowerCase();
            if (lower === 'dark') return 'dark';
            if (lower === 'light') return 'light';
            return null;

          const query = new URLSearchParams(window.location.search);
          const queryThemeRaw = query.get('theme');
          const cookieMatch = document.cookie.match(/(?:^|;\s*)THEME=([^;]+)/);
          const cookieThemeRaw = cookieMatch ? decodeURIComponent(cookieMatch[1]) : null;

          const queryTheme = normalizeTheme(queryThemeRaw);

          const localTheme = normalizeTheme(localThemeRaw);

          // 优先级：query > cookie > localStorage > OS
          let resolvedTheme = queryTheme || cookieTheme || localTheme;
          let resolvedFrom = queryTheme ? 'query' : cookieTheme ? 'cookie' : localTheme ? 'localStorage' : 'os';

          if (!resolvedTheme) {
            // Fall back to OS preference
            resolvedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            resolvedFrom = 'os';

            queryTheme: queryThemeRaw,
            cookieTheme: cookieThemeRaw,
            localTheme: localThemeRaw,
            resolvedTheme,
            resolvedFrom
          });

        } catch (e) {
